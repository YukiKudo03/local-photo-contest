# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  daily_digest:
    class: DailyDigestJob
    schedule: at 8am Asia/Tokyo every day
  judging_reminder:
    class: JudgingReminderJob
    schedule: at 9am Asia/Tokyo every Monday
  judging_deadline:
    class: JudgingDeadlineJob
    schedule: at 9am Asia/Tokyo every day
  contest_state_transition:
    class: ContestStateTransitionJob
    schedule: every 5 minutes
  graduated_judging_reminder:
    class: GraduatedJudgingReminderJob
    schedule: at 9am Asia/Tokyo every day
  winner_notification_scan:
    class: WinnerNotificationJob
    schedule: at 10am Asia/Tokyo every day
  contest_auto_archive:
    class: ContestAutoArchiveJob
    schedule: at 2am Asia/Tokyo every day
  data_export_cleanup:
    class: DataExportCleanupJob
    schedule: at 3am Asia/Tokyo every day
  account_deletion:
    class: AccountDeletionJob
    schedule: at 4am Asia/Tokyo every day
  deletion_reminder:
    class: DeletionReminderJob
    schedule: at 9:30am Asia/Tokyo every day
  statistics_cache_warmup:
    class: StatisticsCacheWarmupJob
    schedule: every 30 minutes
  weekly_analytics_report:
    class: AnalyticsReportJob
    schedule: at 3am Asia/Tokyo every Monday
  daily_database_backup:
    class: DatabaseBackupJob
    args: ["daily"]
    schedule: at 3:30am Asia/Tokyo every day
  weekly_database_backup:
    class: DatabaseBackupJob
    args: ["weekly"]
    schedule: at 3:30am Asia/Tokyo every Sunday
  active_storage_maintenance:
    class: ActiveStorageMaintenanceJob
    schedule: at 4:30am Asia/Tokyo every Sunday

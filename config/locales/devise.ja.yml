    messages:
      already_confirmed: "はすでに確認済みです。ログインしてください。"
      confirmation_period_expired: "は%{period}以内に確認する必要があります。新しい確認メールを送信してください。"
      expired: "の有効期限が切れました。新しいものを取得してください。"
      not_found: "は見つかりませんでした。"
      not_locked: "はロックされていません。"
      not_saved:
        one: "エラーにより%{resource}を保存できませんでした:"
        other: "%{count}件のエラーにより%{resource}を保存できませんでした:"

      failure: "%{kind}アカウントによる認証に失敗しました。理由: %{reason}"
      success: "%{kind}アカウントによる認証に成功しました。"
    passwords:
      no_token: "このページにはパスワード再設定メールからのみアクセスできます。再設定メールからアクセスした場合は、URLが正しいかご確認ください。"
      send_instructions: "パスワード再設定のメールを送信しました。"
      send_paranoid_instructions: "メールアドレスが登録されている場合、パスワード再設定のメールを送信します。"
      updated: "パスワードが変更されました。ログインしました。"
      updated_not_active: "パスワードが変更されました。"
    registrations:
      destroyed: "アカウントを削除しました。またのご利用をお待ちしております。"
      signed_up: "アカウント登録が完了しました。"
      signed_up_but_inactive: "アカウント登録が完了しました。ただし、アカウントが有効化されていないためログインできません。"
      signed_up_but_locked: "アカウント登録が完了しました。ただし、アカウントがロックされているためログインできません。"
      signed_up_but_unconfirmed: "確認メールを送信しました。メール内のリンクをクリックしてアカウントを有効化してください。"
      update_needs_confirmation: "アカウント情報を更新しました。新しいメールアドレスの確認が必要です。確認メールをご確認ください。"
      updated: "アカウント情報を更新しました。"
      updated_but_not_signed_in: "アカウント情報を更新しました。パスワードが変更されたため、再度ログインしてください。"
    sessions:
      signed_in: "ログインしました。"
      signed_out: "ログアウトしました。"
      already_signed_out: "すでにログアウトしています。"
    unlocks:
      send_instructions: "アカウントロック解除のメールを送信しました。"
      send_paranoid_instructions: "アカウントが存在する場合、ロック解除のメールを送信します。"
      unlocked: "アカウントのロックが解除されました。ログインしてください。"

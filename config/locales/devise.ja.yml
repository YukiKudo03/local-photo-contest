      confirmation_instructions:
        subject: "メールアドレス確認のお願い"
      reset_password_instructions:
        subject: "パスワード再設定のお願い"
      unlock_instructions:
        subject: "アカウントロック解除のお願い"
      email_changed:
        subject: "メールアドレス変更のお知らせ"
      password_change:
        subject: "パスワード変更のお知らせ"

# Devise Japanese locale file
# Based on https://github.com/heartcombo/devise/wiki/I18n

ja:
  devise:
    confirmations:
      confirmed: "メールアドレスが確認されました。"
      send_instructions: "アカウント確認のメールを送信しました。"
      send_paranoid_instructions: "メールアドレスが登録されている場合、アカウント確認のメールを送信します。"
    failure:
      already_authenticated: "すでにログインしています。"
      inactive: "アカウントがまだ有効化されていません。"
      invalid: "%{authentication_keys}またはパスワードが違います。"
      locked: "アカウントがロックされています。"
      last_attempt: "あと1回失敗するとアカウントがロックされます。"
      not_found_in_database: "%{authentication_keys}またはパスワードが違います。"
      timeout: "セッションがタイムアウトしました。もう一度ログインしてください。"
      unauthenticated: "ログインまたはアカウント登録が必要です。"
      unconfirmed: "メールアドレスの確認が必要です。"

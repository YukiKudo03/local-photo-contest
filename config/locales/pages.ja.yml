ja:
  pages:
    privacy_policy:
      title: プライバシーポリシー
      last_updated: "最終更新日: %{date}"
      intro:
        title: はじめに
        body: >
          Local Photo Contest（以下「当サービス」）は、お客様のプライバシーを保護することに
          努めています。本プライバシーポリシーは、当サービスをご利用いただく際に、
          お客様の情報をどのように収集、使用、開示、保護するかについて説明します。
      collection:
        title: 収集する情報
        body: >
          当サービスでは以下の情報を収集します：
        items:
          - アカウント情報（氏名、メールアドレス、パスワード）
          - プロフィール情報（自己紹介、アバター画像）
          - コンテスト応募作品（写真、タイトル、説明文、位置情報）
          - 投票・コメント履歴
          - 利用データ（アクセスログ、IPアドレス）
      usage:
        title: 情報の利用目的
        body: >
          収集した情報は以下の目的で利用します：
        items:
          - サービスの提供および維持
          - コンテスト応募・投票の処理
          - コンテストや結果に関する通知の送信
          - サービスおよびユーザー体験の改善
          - 法的義務の遵守
      sharing:
        title: 情報の共有
        body: >
          当サービスはお客様の個人情報を販売しません。以下の場合にのみ情報を共有することがあります：
        items:
          - お客様の同意がある場合
          - 法的義務を遵守する場合
          - ユーザーの権利と安全を保護する場合
      rights:
        title: お客様の権利
        body: >
          お客様には以下の権利があります：
        items:
          - 個人データへのアクセス
          - 不正確なデータの訂正の要求
          - データの削除の要求
          - ポータブル形式でのデータエクスポート
          - データ処理に対する同意の撤回
      cookies:
        title: Cookie（クッキー）について
        body: >
          当サービスでは、セッション維持および設定保存のために必須Cookieを使用しています。
          詳細はCookie同意設定をご確認ください。
      contact:
        title: お問い合わせ
        body: >
          本プライバシーポリシーに関するご質問は、サイト管理者までお問い合わせください。
    terms_of_service:
      title: 利用規約
      no_terms: 利用規約は現在準備中です。後日ご確認ください。
